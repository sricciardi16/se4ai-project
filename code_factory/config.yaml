profiles:
  task_splitter:
    inference: inference.deterministic-relaxed.gemini_3_high_think
    provider: provider.gemini.vertexse4ai.3-1-pro-preview
    constraints: constraints.low
    behavior: behavior.task_splitter
    archive: archive.markdown.experiments.task_splitter
    input_source: io.input.variable
    output_sink: io.output.variable
    response_sanitization:
    - middleware.think_tag_remover
    presentation:
    - middleware.task_list_isolator
    max_history_length: 0
  json_converter:
    inference: inference.deterministic-relaxed.gemini_3_high_think
    provider: provider.gemini.vertexse4ai.3-1-flash-lite
    constraints: constraints.standard
    behavior: behavior.json_converter
    archive: archive.markdown.experiments.json_converter
    input_source: io.input.variable
    output_sink: io.output.variable
    response_sanitization:
    - middleware.think_tag_remover
    - middleware.json_fence_enforcer
    post_response_normalization:
    - middleware.json_code_block_tagger
    - middleware.json_escape_repair
    presentation:
    - middleware.json_fence_stripper
    max_history_length: 0
