  archive.markdown.experiments.01_blueprint_generation:
    directory_path: "./experiments/01_blueprint_generation"


  archive.markdown.experiments.02_detailed_spec_generation:
    directory_path: "./experiments/02_detailed_spec_generation"


  archive.markdown.experiments.03_json_conversion:
    directory_path: "./experiments/03_json_conversion"


  middleware.test_spec_json_validator:
    type: "test_spec_json_validator"



profiles:
  01_blueprint_generation:
    inference: "inference.quasi-deterministic.gemini_3_high_think"
    behavior: "behavior.void"
